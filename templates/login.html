<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background: linear-gradient(135deg, #eaffea, #c9f7c9);
}

.glass{
  width:480px;
  padding:55px;
  background: rgba(255,255,255,0.28);
  backdrop-filter: blur(14px);
  border-radius:25px;
  box-shadow:0 15px 50px rgba(0,0,0,0.18);
  text-align:center;
}

.glass h2{
  margin-bottom:30px;
  font-size:30px;
  color:#1b5e20;
}

input{
  width:100%;
  padding:18px;
  margin-bottom:25px;
  border:none;
  border-radius:30px;
  background: rgba(255,255,255,0.8);
  font-size:18px;
}

button{
  width:100%;
  padding:18px;
  border:none;
  border-radius:35px;
  background:#7CFF7C;
  font-size:20px;
  cursor:pointer;
  box-shadow:0 0 25px #6f6;
  transition:0.3s;
}

button:hover{
  transform:scale(1.06);
  box-shadow:0 0 35px #3c3;
}

p{
  margin-top:25px;
  font-size:16px;
  color:#2e7d32;
}
</style>
</head>

<body>

<div class="glass">
  <h2>Welcome Back</h2>

  
  <form method="POST" action="/login">
    <input type="text" name="username" placeholder="Enter your name" required>
    <button type="submit">Login</button>
  </form>

  <p>Hair Health Monitoring System</p>
</div>

</body>
</html>
