<!DOCTYPE html>
<html>
<head>
    <title>Hair Health Scan</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(#c9f7c9);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding:30px;
            border-radius:25px;
            width:400px;
            text-align:center;
            color:rgb(15, 15, 15);
            box-shadow:0 15px 35px rgba(0,0,0,0.4);
        }

        h2{
            margin-bottom:20px;
            font-weight:600;
            letter-spacing:1px;
        }

        video, img{
            width:300px;
            height:300px;
            border-radius:20px;
            border:4px solid #ffffff;
            object-fit:cover;
            box-shadow:0 0 20px rgba(255,255,255,0.6);
        }

        .buttons{
            margin-top:20px;
        }

        button{
            padding:10px 18px;
            margin:6px;
            border:none;
            border-radius:30px;
            cursor:pointer;
            font-weight:600;
            transition:0.3s;
        }

        .start{
            background:#00e676;
            color:black;
        }

        .stop{
            background:#ff1744;
            color:white;
        }

        .capture{
            background:#25e22f;
            color:white;
        }

        .view{
            background:#3326e2;
            color:black;
            width:100%;
            margin-top:15px;
        }

        button:hover{
            transform:scale(1.08);
            box-shadow:0 0 15px white;
        }

        input[type="file"]{
            margin-top:15px;
            color:white;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Hair Health Scanner</h2>

    <video id="video" autoplay></video>
    <img id="preview" style="display:none; margin-top:10px;">

    <form method="POST" action="/analyze" enctype="multipart/form-data">

        <input type="hidden" name="captured_image" id="captured_image">

        <div class="buttons">
            <button type="button" class="start" onclick="startCamera()">Start</button>
            <button type="button" class="stop" onclick="stopCamera()">Stop</button>
            <button type="button" class="capture" onclick="captureImage()">Capture</button>
        </div>

        
        <input type="file" id="upload" name="upload_image" accept="image/*">

        <button type="submit" class="view">View Result</button>

    </form>

</div>

<script>

let video = document.getElementById("video");
let preview = document.getElementById("preview");
let stream;

function startCamera(){
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(function(s){
        stream = s;
        video.srcObject = stream;
    })
    .catch(function(){
        alert("Camera permission denied!");
    });
}

function stopCamera(){
    if(stream){
        stream.getTracks().forEach(track => track.stop());
        video.srcObject = null;
    }
}

function captureImage(){

    let canvas = document.createElement("canvas");

    canvas.width = 400;
    canvas.height = 400;

    let context = canvas.getContext("2d");
    context.drawImage(video, 0, 0, 400, 400);

    let imageData = canvas.toDataURL("image/jpeg", 0.6);

    document.getElementById("captured_image").value = imageData;

    alert("Image Captured Successfully!");
}

document.getElementById("upload").addEventListener("change", function(){

    let file = this.files[0];

    let reader = new FileReader();

    reader.onload = function(){
        localStorage.setItem("scanImage", reader.result);
    }

    reader.readAsDataURL(file);

});

</script>

</body>
</html>
