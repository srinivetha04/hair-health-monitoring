<!DOCTYPE html>
<html>
<head>
<title>Welcome</title>

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial, sans-serif;
  display:flex;
  background-color: #a5ffa5;
}

/* LEFT IMAGE SECTION */
.left{
  flex:2;
  background-image: url("{{ url_for('static', filename='images/hair_bg1.png') }}");
  background-size: contain;          /* crown crop aagadhu */
  background-position: center;
  background-repeat: no-repeat;
  background-color:#e3f7e3;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* GLASS OVERLAY */
.overlay{
  background: rgba(0,0,0,0.45);
  padding:50px;
  border-radius:20px;
  text-align:center;
  color:rgb(234, 241, 233);
  max-width:500px;
}

/* TITLE */
.overlay h1{
  margin:0;
  font-size:44px;
  letter-spacing:1px;
}

/* SUB TEXT */
.overlay p{
  margin-top:15px;
  font-size:18px;
  line-height:1.6;
  opacity:0.95;
}

/* RIGHT SECTION */
.right{
  flex:1;
  background:#e4f8e4;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:40px;
}

/* CONTINUE BUTTON */
button{
  padding:20px 70px;
  border:none;
  border-radius:40px;
  font-size:20px;
  cursor:pointer;
  background:#98f798;
  box-shadow:0 0 20px rgb(200, 245, 200);
  animation:glow 1.5s infinite alternate;
}

@keyframes glow{
  from{box-shadow:0 0 12px #6f6}
  to{box-shadow:0 0 30px #3c3}
}

/* SMALL TEXT */
.right p{
  margin-top:25px;
  font-size:15px;
  color:#a6eeaa;
}
</style>
</head>

<body>

<!-- LEFT SIDE -->
<div class="left">
  <div class="overlay">
    <h1>Hair Health Monitoring System</h1>
    <p>
      Monitor your hair condition, detect problems early,  
      and receive personalized care suggestions  
      for healthy & confident hair.
    </p>
  </div>
</div>

<!-- RIGHT SIDE -->
<div class="right">
  <button onclick="location.href='/login'">→ Continue</button>
  <p>AI-Based Hair Analysis Platform</p>
</div>

</body>
</html>
